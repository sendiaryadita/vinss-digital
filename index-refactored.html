<!-- ================= SCRIPT ================= -->
<script src="services-data.js"></script>
<script src="render-functions.js"></script>

<script>
// ====== CONFIG ======
const WA_NUMBER = '6285758131482';

// ====== STATE & UTILS ======
const mainPage = document.getElementById('mainPage');
let CURRENT_SERVICE = 'Beranda';

function getTemplateText(id){
  const t = document.getElementById(id);
  if(!t) {
    console.warn('Template not found:', id);
    return '';
  }
  let text = '';
  if(t.tagName === 'TEMPLATE') {
    text = t.innerHTML.trim();
  } else {
    text = t.textContent.trim();
  }
  return text;
}

function showToast(msg){
  const el = document.getElementById('toast');
  if(!el) return;
  el.textContent = msg;
  el.classList.remove('opacity-0');
  el.classList.add('opacity-100');
  setTimeout(()=>{ el.classList.add('opacity-0'); el.classList.remove('opacity-100'); }, 1600);
}

function setWALink(){
  if(!WA_NUMBER){
    console.warn('WA_NUMBER tidak dikonfigurasi');
    return;
  }
  const phone = WA_NUMBER.replace(/\D/g,'');
  const serviceText = CURRENT_SERVICE && CURRENT_SERVICE !== 'Beranda' ? CURRENT_SERVICE : 'layanan digital';
  const msg = 'Halo admin, saya mau order ' + serviceText + '.';
  const href = 'https://wa.me/' + phone + '?text=' + encodeURIComponent(msg);
  const btn = document.getElementById('waFloat');
  if(btn && phone) btn.setAttribute('href', href);
}

function orderViaWA(templateId){
  if(!WA_NUMBER){
    console.error('WA_NUMBER not configured');
    showToast('Nomor WhatsApp belum dikonfigurasi');
    return;
  }

  const txt = getTemplateText(templateId);
  if(!txt){
    showToast('Format template tidak ditemukan');
    return;
  }

  const phone = WA_NUMBER.replace(/\D/g,'');
  const msg = encodeURIComponent(txt);
  const waLink = 'https://wa.me/' + phone + '?text=' + msg;
  window.open(waLink, '_blank');
}

// ====== BIND COPY & ORDER ======
function bindCopyAndOrder(){
  const copyBtns = document.querySelectorAll('.copyBtn');
  copyBtns.forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const id = btn.getAttribute('data-copy');
      const txt = getTemplateText(id);
      if(txt){
        try {
          await navigator.clipboard.writeText(txt);
          showToast('Format disalin ke clipboard ✓');
        } catch(e){
          console.error('Copy error:', e);
          showToast('Gagal menyalin format');
        }
      }
    });
  });

  const orderBtns = document.querySelectorAll('.orderBtn');
  orderBtns.forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.getAttribute('data-order');
      orderViaWA(id);
    });
  });
}

// ====== BIND SEARCH ======
function bindSearch(){
  const searchInput = document.getElementById('searchInput');
  const serviceGrid = document.getElementById('serviceGrid');
  if (searchInput && serviceGrid){
    const cards = Array.from(serviceGrid.children);
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim().toLowerCase();
      cards.forEach(card => {
        const name = card.innerText.trim().toLowerCase();
        card.style.display = name.includes(q) ? '' : 'none';
      });
    });
  }
}

// ====== INIT ======
function initApp(){
  if (typeof renderServiceGrid === 'function') {
    renderServiceGrid();
    bindCopyAndOrder();
    bindSearch();
    setWALink();
  } else {
    console.error('renderServiceGrid function not loaded');
  }
}

// Run when DOM is ready
if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', initApp);
} else {
  initApp();
}
</script>
